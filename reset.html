<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>アプリ更新の反映</title>
  <style>
    body { margin:0; min-height:100vh; display:grid; place-items:center; font-family:system-ui,-apple-system,"Segoe UI",sans-serif; background:#f5f7fb; color:#17233a; }
    main { width:min(600px,calc(100% - 32px)); padding:28px; border:1px solid #dce3ef; border-radius:16px; background:#fff; box-shadow:0 10px 28px rgba(30,45,78,.07); }
    h1 { margin:0 0 12px; font-size:22px; }
    p, li { line-height:1.7; }
    button { padding:10px 14px; border:0; border-radius:9px; background:#2563eb; color:#fff; font-weight:800; cursor:pointer; }
    .note { padding:12px; border-radius:10px; background:#f0f4fb; font-size:14px; }
    #status { font-weight:800; }
  </style>
</head>
<body>
  <main>
    <h1>アプリ更新を反映します</h1>
    <p>この操作は、古いPWAのキャッシュとService Workerだけを削除します。</p>
    <p class="note"><strong>企業の登録データ・ID・パスワードを保存しているlocalStorageは削除しません。</strong></p>
    <ol>
      <li>下のボタンを1回押します。</li>
      <li>自動的に最新版のアプリへ戻ります。</li>
      <li>戻った画面の右上が「オンライン」または「オフライン」になれば成功です。</li>
    </ol>
    <button id="resetButton" type="button">古いPWAキャッシュを削除して最新版を開く</button>
    <p id="status" aria-live="polite"></p>
  </main>
  <script>
    document.getElementById("resetButton").addEventListener("click", async () => {
      const status = document.getElementById("status");
      status.textContent = "更新処理中です…";
      try {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }
        if ("caches" in window) {
          const names = await caches.keys();
          await Promise.all(names.map((name) => caches.delete(name)));
        }
        status.textContent = "完了しました。最新版を開きます…";
        setTimeout(() => {
          location.replace("./?v=10&reset=" + Date.now());
        }, 500);
      } catch (error) {
        console.error(error);
        status.textContent = "更新処理に失敗しました。ページを再読み込みしてもう一度試してください。";
      }
    });
  </script>
</body>
</html>
